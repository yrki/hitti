services:
  postgres:
    image: postgres:17
    container_name: hitti-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: VeldigHemmeligPassord1
      POSTGRES_DB: hitti
    ports:
      - "5433:5432"
    volumes:
      - ./dockervolumes/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hitti"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: hitti-backend:latest
    container_name: hitti-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=hitti;Username=admin;Password=VeldigHemmeligPassord1"
      Jwt__Key: "HittiDevSigningKey2026AtLeast32Chars!!!!!"
      Jwt__Issuer: "hitti"
      Jwt__Audience: "hitti-frontend"
      Jwt__ExpirationMinutes: "480"
      AzureCommunication__ConnectionString: "endpoint=https://medlem-utv.norway.communication.azure.com/;accesskey=REPLACE_WITH_ACTUAL_KEY"
      AzureCommunication__SmsFromNumber: "+4790039442"
      AzureCommunication__EmailFromAddress: "DoNotReply@d05b7287-13c8-489d-8436-bbf290d798a4.azurecomm.net"
      App__BaseUrl: "http://localhost:3000"
      App__DevRedirectEmail: "thomas@skum.no"
    ports:
      - "5137:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hitti-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

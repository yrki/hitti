services:
  postgres:
    image: postgres:17
    container_name: hitti-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./dockervolumes/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: hitti-backend:latest
    container_name: hitti-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: "hitti"
      Jwt__Audience: "hitti-frontend"
      Jwt__ExpirationMinutes: "480"
      AzureCommunication__ConnectionString: ${AZURE_COMMUNICATION_CONNECTION_STRING}
      AzureCommunication__SmsFromNumber: ${AZURE_COMMUNICATION_SMS_FROM}
      AzureCommunication__EmailFromAddress: ${AZURE_COMMUNICATION_EMAIL_FROM}
      App__BaseUrl: ${APP_BASE_URL}
      App__DevRedirectEmail: ${APP_DEV_REDIRECT_EMAIL}
    ports:
      - "5137:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hitti-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
